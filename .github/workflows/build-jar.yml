name: Build NanoLimbo and upload jar to Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew clean shadowJar \
            -DUUID="${{ secrets.UUID }}" \
            -DANYTLS_PORT="${{ secrets.ANYTLS_PORT }}" \
            -DNAME="${{ secrets.NAME }}" \
            -DTUIC_PORT="${{ secrets.TUIC_PORT }}" \
            -DNEZHA_SERVER="${{ secrets.NEZHA_SERVER }}" \
            -DNEZHA_PORT="${{ secrets.NEZHA_PORT }}" \
            -DNEZHA_KEY="${{ secrets.NEZHA_KEY }}" \
            -DARGO_PORT="${{ secrets.ARGO_PORT }}" \
            -DARGO_DOMAIN="${{ secrets.ARGO_DOMAIN }}" \
            -DARGO_AUTH="${{ secrets.ARGO_AUTH }}" \
            -DS5_PORT="${{ secrets.S5_PORT }}" \
            -DHY2_PORT="${{ secrets.HY2_PORT }}" \
            -DREALITY_PORT="${{ secrets.REALITY_PORT }}" \
            -DANYREALITY_PORT="${{ secrets.ANYREALITY_PORT }}" \
            -DCFIP="${{ secrets.CFIP }}" \
            -DCFPORT="${{ secrets.CFPORT }}" \
            -DUPLOAD_URL="${{ secrets.UPLOAD_URL }}" \
            -DCHAT_ID="${{ secrets.CHAT_ID }}" \
            -DBOT_TOKEN="${{ secrets.BOT_TOKEN }}" \
            -DDISABLE_ARGO="${{ secrets.DISABLE_ARGO }}"

      - name: Prepare JAR
        id: prepare_jar
        run: |
          JAR_PATH=$(find build/libs -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" | head -n 1)
          cp "$JAR_PATH" ./server.jar
          echo "JAR_SIZE=$(ls -lh ./server.jar | awk '{print $5}')" >> $GITHUB_OUTPUT

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        with:
          name: NanoLimbo-artifact
          path: server.jar

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v7
        with:
          name: NanoLimbo-artifact

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "server.jar"
          tag: ${{ github.ref_name }}
          name: "NanoLimbo ${{ github.ref_name }}"
          token: ${{ secrets.GITHUB_TOKEN }}
          allowUpdates: true
          replacesArtifacts: true
          body: "Automated release from workflow run #${{ github.run_number }}"
